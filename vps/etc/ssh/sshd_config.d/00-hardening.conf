# Hardening manual — precede 50-cloud-init.conf (sshd: primeira ocorrência vence)
PasswordAuthentication no
KbdInteractiveAuthentication no
PubkeyAuthentication yes
# root nao loga por SSH; fallback de emergencia e o console do painel Hostinger (senha)
PermitRootLogin no
# VPS headless: sem X11
X11Forwarding no
# menos janela pra brute-force de bot
LoginGraceTime 30
MaxAuthTries 3
